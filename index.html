<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicle Prime | Premium News Matrix & Aggregator</title>
    
    <meta name="description" content="A premium, ultra-responsive dynamic country-wise news and media matrix dashboard.">
    <meta name="keywords" content="news portal, premium aggregator, global news matrix">
    <meta name="robots" content="index, follow">

    <style>
        /* --- CSS VARIABLES & THEMES --- */
        :root {
            --bg-base: #f8fafc;
            --bg-surface: rgba(255, 255, 255, 0.8);
            --bg-surface-solid: #ffffff;
            --border-color: rgba(226, 232, 240, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --glass-blur: 20px;
            --glass-shadow: 0 10px 40px -10px rgba(31, 38, 135, 0.06);
            --radius-sm: 10px;
            --radius-md: 20px;
            --radius-lg: 35px;
            --radius-square: 0px; 
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --bg-base: #090d16;
            --bg-surface: rgba(15, 23, 42, 0.8);
            --bg-surface-solid: #151f32;
            --border-color: rgba(51, 65, 85, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent-primary: #818cf8;
            --accent-hover: #6366f1;
            --glass-shadow: 0 15px 45px -10px rgba(0, 0, 0, 0.4);
        }

        /* --- BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            transition: var(--transition-smooth);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 5% 10%, rgba(99, 102, 241, 0.04) 0%, transparent 35%),
                              radial-gradient(circle at 95% 80%, rgba(236, 72, 153, 0.04) 0%, transparent 35%);
            background-attachment: fixed;
        }

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; background: none; outline: none; transition: var(--transition-smooth); }
        img { max-width: 100%; height: auto; display: block; object-fit: cover; }

        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .glass {
            background: var(--bg-surface);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            box-shadow: var(--glass-shadow);
        }

        .glass-solid {
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
            box-shadow: var(--glass-shadow);
        }

        /* --- HEADER --- */
        header {
            position: sticky;
            top: 0;
            z-index: 99;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-site-links, .footer-site-links {
            display: flex;
            gap: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        
        .header-site-links a, .footer-site-links a { transition: var(--transition-smooth); }
        .header-site-links a:hover, .footer-site-links a:hover { color: var(--accent-primary); }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, var(--accent-primary), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-engine {
            display: flex;
            flex-direction: column;
            text-align: right;
            line-height: 1.2;
            border-left: 3px solid var(--accent-primary);
            padding-left: 12px;
        }

        .date-day { font-size: 14px; font-weight: 800; color: var(--accent-primary); text-transform: uppercase; }
        .date-full { font-size: 11px; font-weight: 600; color: var(--text-secondary); }

        .header-controls { display: flex; align-items: center; gap: 16px; }
        .theme-toggle {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color);
        }

        /* --- BREAKING NEWS TICKER --- */
        .ticker-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: var(--glass-shadow);
            height: 44px;
        }

        .ticker-title {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #ffffff;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            z-index: 5;
        }

        .ticker-text-wrapper {
            overflow: hidden;
            display: flex;
            align-items: center;
            flex-grow: 1;
        }

        .ticker-text-move {
            display: inline-flex;
            white-space: nowrap;
            padding-left: 100%;
            animation: tickerMove 45s linear infinite;
        }

        .ticker-item {
            padding-right: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
        }
        .ticker-item::before { content: "•"; margin-right: 12px; color: #ef4444; font-size: 18px; }

        @keyframes tickerMove {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        .ticker-text-wrapper:hover .ticker-text-move { animation-play-state: paused; }

        /* Headline Banner */
        .center-headline-container { text-align: center; margin: 25px 0; }
        .center-headline {
            font-size: 36px; font-weight: 900; letter-spacing: -1.5px; line-height: 1.2;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
        }

        /* --- AD CONTAINERS --- */
        .ad-container {
            margin: 20px auto; display: flex; justify-content: center; align-items: center;
            width: 100%; max-width: 728px; min-height: 90px;
            border: 1px dashed var(--border-color); background: rgba(148, 163, 184, 0.02);
            border-radius: var(--radius-sm); position: relative;
        }

        /* --- NEW DYNAMIC MATRIX ARCHITECTURE --- */
        .section-title {
            font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            color: var(--text-primary);
        }
        .section-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--border-color); }

        /* --- PREMIUM DROPDOWN ENGINE --- */
        .country-dropdown-wrapper {
            margin-bottom: 35px;
            position: relative;
            width: 100%;
            max-width: 320px;
            margin-right: auto;
        }

        .country-dropdown-wrapper select {
            width: 100%;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            background-color: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            box-shadow: var(--glass-shadow);
            transition: var(--transition-smooth);
        }

        .country-dropdown-wrapper select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .country-dropdown-wrapper::after {
            content: '▼';
            font-size: 12px;
            color: var(--text-secondary);
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* --- CATEGORY FILTERS WITH SCROLL ARROWS --- */
        .category-nav-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .nav-arrow-btn {
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            cursor: pointer;
            border-radius: var(--radius-square);
            color: var(--text-primary);
            box-shadow: var(--glass-shadow);
        }
        .nav-arrow-btn:hover { background: var(--accent-primary); color: #fff; }

        .category-filters-wrapper {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 8px;
            scrollbar-width: none;
            flex-grow: 1;
        }
        .category-filters-wrapper::-webkit-scrollbar {
            display: none;
        }

        .home-cat-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: var(--radius-square);
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            box-shadow: var(--glass-shadow);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .home-cat-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }
        .home-cat-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.4);
        }

        /* Category Grid */
        .category-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px; margin-bottom: 40px;
        }
        .category-card {
            position: relative; border-radius: var(--radius-md); height: 180px;
            overflow: hidden; cursor: pointer; border: 1px solid var(--border-color);
            display: flex; align-items: flex-end; box-shadow: var(--glass-shadow);
        }
        .category-bg-image {
            position: absolute; inset: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; transition: var(--transition-smooth); z-index: 1;
        }
        .category-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.85) 0%, rgba(15, 23, 42, 0.1) 70%);
            z-index: 2; transition: var(--transition-smooth);
        }
        .category-content { position: relative; z-index: 3; padding: 20px; width: 100%; }
        .category-icon { font-size: 26px; margin-bottom: 4px; }
        .category-title { font-size: 18px; font-weight: 800; color: #ffffff; }
        .category-details { font-size: 12px; color: rgba(255, 255, 255, 0.8); margin-top: 5px; }

        .category-card:hover .category-bg-image { transform: scale(1.06); }
        .category-card:hover .category-overlay { background: linear-gradient(to top, var(--accent-hover) 0%, rgba(15, 23, 42, 0.2) 80%); }

        /* --- SECOND LANDING PAGE (PORTALS & SUB-CATEGORIES) --- */
        #newsLandingPage { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .back-btn-wrapper { margin-bottom: 24px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px;
            border-radius: var(--radius-lg); font-weight: 700; font-size: 13px;
            border: 1px solid var(--border-color); background: var(--bg-surface-solid);
            color: var(--text-primary);
        }
        .back-btn:hover { background: var(--accent-primary); color: #ffffff; border-color: var(--accent-primary); }

        /* Sub Category Pipeline */
        .sub-category-filters {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
        }
        .sub-filter-btn {
            padding: 8px 18px; font-size: 13px; font-weight: 700; border-radius: var(--radius-lg);
            background: var(--bg-surface-solid); border: 1px solid var(--border-color);
            color: var(--text-secondary); box-shadow: var(--glass-shadow);
        }
        .sub-filter-btn:hover { border-color: var(--accent-primary); color: var(--text-primary); }
        .sub-filter-btn.active {
            background: var(--text-primary); color: var(--bg-base); border-color: var(--text-primary);
        }

        /* Portal Links Layout */
        .portal-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .portal-item-card {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding: 0 0 12px 0; border-radius: var(--radius-md); border: 1px solid var(--border-color);
            background: var(--bg-surface-solid); transition: var(--transition-smooth);
            box-shadow: var(--glass-shadow); overflow: hidden; height: 100%;
        }
        .portal-item-card:hover {
            transform: translateY(-5px); border-color: var(--accent-primary);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.2);
        }
        .portal-item-logo {
            width: 100%; aspect-ratio: 16 / 10; background-color: #ffffff; 
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center;
            overflow: hidden; padding: 12px;
        }
        .portal-item-logo img { width: 100%; height: 100%; object-fit: contain; }
        .portal-item-info { width: 100%; padding: 12px 10px 0 10px; display: flex; flex-direction: column; gap: 8px; }
        .portal-item-name { font-size: 14px; font-weight: 800; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .portal-item-badge {
            font-size: 11px; color: var(--accent-primary); font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            background: rgba(99, 102, 241, 0.05); padding: 5px 12px; border-radius: var(--radius-lg); width: 100%;
        }
        .portal-item-card:hover .portal-item-badge { background: var(--accent-primary); color: #ffffff; }

        /* --- FOOTER NETWORK HUB --- */
        .footer-wrapper { padding: 30px 0; border-top: 1px solid var(--border-color); margin-top: 5px; }
        .footer-container { display: grid; grid-template-columns: 1fr; text-align: center; gap: 24px; }
        .footer-left { font-size: 13px; color: var(--text-muted); grid-row: 2; }
        .footer-right-hub { display: flex; flex-direction: column; align-items: center; gap: 10px; grid-row: 1; }
        
        .hub-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.8px; }
        .hub-networks-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 400px; }
        .network-item {
            width: 34px; height: 34px; border-radius: 50%; background: var(--bg-surface-solid);
            border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center;
            box-shadow: var(--glass-shadow); transition: var(--transition-smooth);
        }
        .network-item:hover { transform: translateY(-3px); border-color: var(--accent-primary); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2); }
        .network-item img { width: 18px; height: 18px; }

        .back-to-top {
            position: fixed; bottom: 30px; right: 24px; width: 46px; height: 46px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; z-index: 90; color: var(--text-primary);
        }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* --- STABLE RESPONSIVE ENGINE --- */
        @media(max-width: 1024px) {
            .center-headline { font-size: 30px; }
            .portal-grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
        }
        @media(max-width: 768px) {
            .center-headline { font-size: 24px; }
            .header-top { flex-direction: column; gap: 12px; }
            .header-left { align-items: center; text-align: center; }
            .header-site-links { justify-content: center; }
            .date-engine { text-align: center; border-left: none; padding-left: 0; }
            .category-grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
            .portal-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .country-dropdown-wrapper { max-width: 100%; } 
        }
    </style>
</head>

        function initializeCalendarEngine() {
            const now = new Date();
            document.getElementById("weekdayDisplay").textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
            document.getElementById("gregorianDisplay").textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function initializeTicker() {
            const pipeline = document.getElementById("breakingTickerPipeline");
            pipeline.innerHTML = DATABASE.tickerItems.map(item => `<span class="ticker-item">${item}</span>`).join('');
            pipeline.style.animationDuration = DATABASE.speedSettings.tickerDuration;
        }

        function renderCountrySelector() {
            const pipeline = document.getElementById("countryDropdownPipeline");
            pipeline.innerHTML = DATABASE.countries.map(country => 
                `<option value="${country.id}" ${country.id === SELECTED_COUNTRY ? 'selected' : ''}>${country.name}</option>`
            ).join('');
        }

        function renderSiteLinks() {
            const linksHtml = DATABASE.sitePages.map(page => `
                <a href="${page.url}">${page.name}</a>
            `).join('');
            
            document.getElementById("headerLinksPipeline").innerHTML = linksHtml;
            document.getElementById("footerLinksPipeline").innerHTML = linksHtml;
        }

        function setActiveCountry(countryId) {
            SELECTED_COUNTRY = countryId;
            renderCategories(); 
        }

        function scrollCategories(amount) {
            const container = document.getElementById('homeCategoryFiltersPipeline');
            container.scrollBy({ left: amount, behavior: 'smooth' });
        }

        function renderHomeCategoryFilters() {
            const pipeline = document.getElementById("homeCategoryFiltersPipeline");
            
            let html = `<button class="home-cat-btn ${HOME_SELECTED_CATEGORY === 'all' ? 'active' : ''}" onclick="filterHomeCategories('all')">All Categories</button>`;
            
            html += DATABASE.categories.map(cat => `
                <button class="home-cat-btn ${HOME_SELECTED_CATEGORY === cat.id ? 'active' : ''}" onclick="filterHomeCategories('${cat.id}')">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
            
            pipeline.innerHTML = html;
        }

        function filterHomeCategories(categoryId) {
            HOME_SELECTED_CATEGORY = categoryId;
            renderHomeCategoryFilters(); 
            renderCategories(); 
        }

        function renderCategories() {
            const pipeline = document.getElementById("categoryGridPipeline");
            
            let categoriesToShow = DATABASE.categories;
            if (HOME_SELECTED_CATEGORY !== 'all') {
                categoriesToShow = DATABASE.categories.filter(c => c.id === HOME_SELECTED_CATEGORY);
            }

            pipeline.innerHTML = categoriesToShow.map(cat => `
                <div class="category-card" onclick="loadSecondLandingPage('${cat.id}')">
                    <div class="category-bg-image" style="background-image: url('${cat.image}')"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <div class="category-icon">${cat.icon}</div>
                        <h3 class="category-title">${cat.name}</h3>
                        <p class="category-details">${cat.details}</p>
                    </div>
                </div>
            `).join('');
        }

        function loadSecondLandingPage(categoryId) {
            CURRENT_CATEGORY = categoryId;
            SELECTED_SUB_CAT = "all"; 

            const homePage = document.getElementById("homeLandingPage");
            const newsPage = document.getElementById("newsLandingPage");
            const titleElement = document.getElementById("currentCategoryTitle");

            const selectedCat = DATABASE.categories.find(c => c.id === categoryId);
            const selectedCountryObj = DATABASE.countries.find(c => c.id === SELECTED_COUNTRY);
            
            titleElement.innerHTML = `${selectedCountryObj.name} &raquo; ${selectedCat.icon} ${selectedCat.name}`;

            renderSubCategoryFilters();
            renderPortalGrid();

            homePage.style.display = "none";
            newsPage.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderSubCategoryFilters() {
            const pipeline = document.getElementById("subCategoryPipeline");
            pipeline.innerHTML = DATABASE.subCategories.map(sub => `
                <button class="sub-filter-btn ${sub.id === SELECTED_SUB_CAT ? 'active' : ''}" 
                        onclick="filterBySubCategory('${sub.id}')">
                    ${sub.name}
                </button>
            `).join('');
        }

        function filterBySubCategory(subId) {
            SELECTED_SUB_CAT = subId;
            renderSubCategoryFilters();
            renderPortalGrid();
        }

        function renderPortalGrid() {
            const portalPipeline = document.getElementById("portalGridPipeline");
            
            let filtered = DATABASE.publications.filter(p => p.country === SELECTED_COUNTRY && p.category === CURRENT_CATEGORY);
            
            if (SELECTED_SUB_CAT !== "all") {
                filtered = filtered.filter(p => p.subCat === SELECTED_SUB_CAT);
            }

            if(filtered.length === 0) {
                portalPipeline.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted); font-weight:600;">No premium channels deployable inside this specific filter matrix.</div>`;
                return;
            }

            portalPipeline.innerHTML = filtered.map(portal => `
                <a href="${portal.url}" target="_blank" rel="noopener noreferrer">
                    <div class="portal-item-card glass-solid">
                        <div class="portal-item-logo">
                            <img src="${portal.logo}" alt="${portal.name}" onerror="this.src='https://img.icons8.com/color/120/news.png'">
                        </div>
                        <div class="portal-item-info">
                            <span class="portal-item-name">${portal.name}</span>
                            <div>
                                <span class="portal-item-badge">
                                    ${DATABASE.speedSettings.portalBadgeText}
                                    <svg style="width:11px; height:11px; fill:none; stroke:currentColor; stroke-width:2.5;" viewBox="0 0 24 24">
                                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                        <polyline points="15 3 21 3 21 9"></polyline>
                                        <line x1="10" y1="14" x2="21" y2="3"></line>
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function navigateToHome(e) {
            if(e) e.preventDefault();
            document.getElementById("newsLandingPage").style.display = "none";
            document.getElementById("homeLandingPage").style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initializeThemeSystem() {
            const toggleBtn = document.getElementById("themeToggleBtn");
            const sun = toggleBtn.querySelector(".sun-icon");
            const moon = toggleBtn.querySelector(".moon-icon");
            let activeTheme = localStorage.getItem("CHRONICLE_THEME") || "light";

            function applyTheme(target) {
                document.documentElement.setAttribute("data-theme", target);
                localStorage.setItem("CHRONICLE_THEME", target);
                if (target === "dark") { sun.style.display = "block"; moon.style.display = "none"; }
                else { sun.style.display = "none"; moon.style.display = "block"; }
            }
            applyTheme(activeTheme);
            toggleBtn.addEventListener("click", () => {
                const current = document.documentElement.getAttribute("data-theme");
                applyTheme(current === "dark" ? "light" : "dark");
            });
        }

        function renderFooterSocialHub() {
            const pipeline = document.getElementById("footerSocialNetworksPipeline");
            pipeline.innerHTML = DATABASE.socialLinks.map(link => `
                <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="network-item" title="${link.name}">
                    <img src="${link.icon}" alt="${link.name}" onerror="this.src='https://img.icons8.com/color/48/globe.png'">
                </a>
            `).join('');
        }

        document.addEventListener("DOMContentLoaded", () => {
            initializeThemeSystem();
            initializeCalendarEngine();
            initializeTicker();
            renderCountrySelector();
            renderSiteLinks();
            document.getElementById("autoYear").textContent = new Date().getFullYear();
            renderHomeCategoryFilters(); 
            renderCategories();
            renderFooterSocialHub();

            const fab = document.getElementById("backToTopFab");
            window.addEventListener("scroll", () => {
                if(window.scrollY > 300) fab.classList.add("visible");
                else fab.classList.remove("visible");
            });
        });
